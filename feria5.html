<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Opiniones</title>

<style>

body{
    margin:0;
    background-image:url("https://i.pinimg.com/736x/39/f8/98/39f898fa20e7dd9bce7e5e1a3c5834b6.jpg");
    font-family:Arial, sans-serif;
    background-size:cover;
    background-attachment:fixed;
    text-align:center;
}

header{
    background:linear-gradient(
        90deg,
        aqua,
        deepskyblue,
        royalblue
    );
    color:white;
    padding:20px;
}

#lista{
    width:80%;
    margin:auto;
}

.comentario{
    background:white;
    border-radius:15px;
    padding:15px;
    margin:15px;
    box-shadow:0 0 10px gray;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:aqua;
    cursor:pointer;
}

</style>

</head>

<body>

<header>
    <h1>Opiniones de los Visitantes</h1>
</header>

<br>

<div id="lista"></div>

<a href="feria2.html">
<button>Regresar</button>
</a>

<script>

let opiniones =
JSON.parse(localStorage.getItem("opiniones")) || [];

let lista =
document.getElementById("lista");

opiniones.forEach(function(opinion){

    lista.innerHTML +=
    `
    <div class="comentario">
        ${opinion}
    </div>
    `;

});

</script>

</body>
</html>
